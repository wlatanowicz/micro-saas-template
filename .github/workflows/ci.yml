name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  build-and-verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.11"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend Python dependencies
        run: uv sync --frozen --all-groups
        working-directory: backend

      - name: Backend unit tests
        run: uv run pytest
        working-directory: backend

      - name: Ruff
        run: uv run ruff check src tests
        working-directory: backend

      - name: Export Lambda requirements
        run: uv export --frozen --no-dev --no-emit-project --no-hashes -o requirements-lambda.txt
        working-directory: backend

      - name: Install backend npm dependencies
        run: npm ci
        working-directory: backend

      - name: Validate Serverless config
        run: npx serverless@3 print >/dev/null
        working-directory: backend

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        env:
          VITE_API_BASE_URL: http://127.0.0.1:8000
        run: npm run build
        working-directory: frontend
