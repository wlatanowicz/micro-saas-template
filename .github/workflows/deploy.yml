name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      STAGE: prod
      REGION: ${{ vars.AWS_REGION || 'eu-central-1' }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      FRONTEND_ACM_CERT_ARN: ${{ secrets.FRONTEND_ACM_CERT_ARN }}
      FRONTEND_DOMAIN_NAME: ${{ vars.FRONTEND_DOMAIN_NAME }}
      RDS_VPC_ID: ${{ vars.RDS_VPC_ID }}
      LAMBDA_VPC_SUBNET_ID_1: ${{ vars.LAMBDA_VPC_SUBNET_ID_1 || secrets.LAMBDA_VPC_SUBNET_ID_1 }}
      LAMBDA_VPC_SUBNET_ID_2: ${{ vars.LAMBDA_VPC_SUBNET_ID_2 || secrets.LAMBDA_VPC_SUBNET_ID_2 }}
      LAMBDA_VPC_SUBNET_ID_3: ${{ vars.LAMBDA_VPC_SUBNET_ID_3 || secrets.LAMBDA_VPC_SUBNET_ID_3 }}
      LAMBDA_VPC_SECURITY_GROUP_ID: ${{ vars.LAMBDA_VPC_SECURITY_GROUP_ID || secrets.LAMBDA_VPC_SECURITY_GROUP_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.REGION }}

      - name: Install backend npm dependencies
        run: npm ci
        working-directory: backend

      # predeploy: export requirements + serverless.deploy.yml (job env includes LAMBDA_VPC_* from vars/secrets).
      - name: Deploy backend stack
        run: npm run deploy -- --stage "${STAGE}" --region "${REGION}"
        working-directory: backend

      - name: Run database migrations (Lambda)
        run: bash scripts/invoke-migrate-lambda.sh "${STAGE}" "${REGION}"

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Deploy frontend to S3
        run: bash scripts/deploy-frontend.sh "${STAGE}" "${REGION}"

      - name: Update Cloudflare CNAME to CloudFront
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_ZONE_NAME: ${{ secrets.CLOUDFLARE_ZONE_NAME }}
        run: bash scripts/update-cloudflare-frontend-cname.sh "${STAGE}" "${REGION}"
