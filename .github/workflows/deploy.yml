name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      STAGE: prod
      REGION: ${{ vars.AWS_REGION || 'eu-central-1' }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      AUTH_GOOGLE_ENABLED: ${{ vars.AUTH_GOOGLE_ENABLED || 'false' }}
      AUTH_GOOGLE_CLIENT_ID: ${{ vars.AUTH_GOOGLE_CLIENT_ID || '' }}
      AUTH_GOOGLE_CLIENT_SECRET: ${{ secrets.AUTH_GOOGLE_CLIENT_SECRET }}
      AUTH_FACEBOOK_ENABLED: ${{ vars.AUTH_FACEBOOK_ENABLED || 'false' }}
      AUTH_FACEBOOK_APP_ID: ${{ vars.AUTH_FACEBOOK_APP_ID || '' }}
      AUTH_FACEBOOK_APP_SECRET: ${{ secrets.AUTH_FACEBOOK_APP_SECRET }}
      AUTH_FRONTEND_URL: ${{ vars.AUTH_FRONTEND_URL != '' && vars.AUTH_FRONTEND_URL || (vars.FRONTEND_DOMAIN_NAME != '' && format('https://{0}', vars.FRONTEND_DOMAIN_NAME) || '') }}
      FRONTEND_ACM_CERT_ARN: ${{ secrets.FRONTEND_ACM_CERT_ARN }}
      FRONTEND_DOMAIN_NAME: ${{ vars.FRONTEND_DOMAIN_NAME }}
      API_ACM_CERT_ARN: ${{ secrets.API_ACM_CERT_ARN }}
      API_DOMAIN_NAME: ${{ vars.API_DOMAIN_NAME != '' && vars.API_DOMAIN_NAME || (vars.FRONTEND_DOMAIN_NAME != '' && format('api.{0}', vars.FRONTEND_DOMAIN_NAME) || '') }}
      NOTIFICATIONS_TRANSPORT: ses
      NOTIFICATIONS_FROM_EMAIL: ${{ vars.NOTIFICATIONS_FROM_EMAIL != '' && vars.NOTIFICATIONS_FROM_EMAIL || (vars.FRONTEND_DOMAIN_NAME != '' && format('noreply@{0}', vars.FRONTEND_DOMAIN_NAME) || '') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.REGION }}

      - name: Install backend npm dependencies
        run: npm ci
        working-directory: backend

      - name: Deploy backend stack
        run: npm run deploy -- --stage "${STAGE}" --region "${REGION}"
        working-directory: backend

      - name: Run database migrations (Lambda)
        run: bash scripts/invoke-migrate-lambda.sh "${STAGE}" "${REGION}"

      - name: Update Cloudflare CNAME to API Gateway
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_ZONE_NAME: ${{ secrets.CLOUDFLARE_ZONE_NAME }}
        run: bash scripts/update-cloudflare-api-cname.sh "${STAGE}" "${REGION}"

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Deploy frontend to S3
        run: bash scripts/deploy-frontend.sh "${STAGE}" "${REGION}"

      - name: Update Cloudflare CNAME to CloudFront
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_ZONE_NAME: ${{ secrets.CLOUDFLARE_ZONE_NAME }}
        run: bash scripts/update-cloudflare-frontend-cname.sh "${STAGE}" "${REGION}"
