service: micro-saas-app

frameworkVersion: "3"

plugins:
  - serverless-python-requirements

custom:
  pythonRequirements:
    fileName: requirements-lambda.txt
    dockerizePip: non-linux
    slim: true
    strip: false
    noDeploy:
      - boto3
      - botocore

  # Custom hostname + ACM are optional. Set BOTH env vars for a custom domain; otherwise CloudFront
  # uses the default *.cloudfront.net certificate (no Aliases). The ACM cert must be in us-east-1
  # and include this hostname in SAN, or creation fails with an invalid CNAME error.
  frontendDomainName: ${env:FRONTEND_DOMAIN_NAME, ''}
  frontendAcmCertArn: ${env:FRONTEND_ACM_CERT_ARN, ''}

provider:
  name: aws
  runtime: python3.11
  region: ${opt:region, 'eu-central-1'}
  stage: ${opt:stage, 'prod'}
  memorySize: 512
  timeout: 30
  httpApi:
    cors:
      allowedOrigins:
        - "*"
      allowedHeaders:
        - Content-Type
        - Authorization
      allowedMethods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
  environment:
    DATABASE_URL: ${env:DATABASE_URL, ''}
  # Lambda VPC: set LAMBDA_VPC_SUBNET_IDS. Prefer RDS_VPC_ID + RDS_SECURITY_GROUP_ID so the stack
  # creates a Lambda SG and opens the RDS security group on 5432. Or set LAMBDA_VPC_SECURITY_GROUP_IDS
  # manually (comma-separated). See README.
  vpc: ${file(./serverless-lambda-vpc.cjs)}

functions:
  api:
    handler: src.handler.handler
    package:
      patterns:
        - "!alembic/**"
        - "!alembic.ini"
        - "!src/migrate_handler.py"
    events:
      - httpApi:
          path: /
          method: ANY
      - httpApi:
          path: /{proxy+}
          method: ANY

  migrate:
    handler: src/migrate_handler.handler
    timeout: 120
    memorySize: 512
    description: Alembic upgrade head (invoke after deploy)

package:
  individually: true
  patterns:
    - "!venv/**"
    - "!.venv/**"
    - "!tests/**"
    - "!**/__pycache__/**"
    - "!*.pyc"
    - "!pyproject.toml"
    - "!uv.lock"
    - "!requirements-lambda.txt"
    - "!.ruff_cache/**"

resources:
  Conditions:
    HasFrontendCustomDomain:
      Fn::And:
        - Fn::Not:
            - Fn::Equals:
                - "${self:custom.frontendDomainName}"
                - ""
        - Fn::Not:
            - Fn::Equals:
                - "${self:custom.frontendAcmCertArn}"
                - ""

    # Managed Lambda ENI security group + RDS ingress (PostgreSQL 5432). Matches serverless-lambda-vpc.cjs.
    UseLambdaVpcWithRds:
      Fn::And:
        - Fn::Not:
            - Fn::Equals:
                - "${env:RDS_VPC_ID, ''}"
                - ""
        - Fn::Not:
            - Fn::Equals:
                - "${env:RDS_SECURITY_GROUP_ID, ''}"
                - ""
        - Fn::Not:
            - Fn::Equals:
                - "${env:LAMBDA_VPC_SUBNET_IDS, ''}"
                - ""

  Resources:
    LambdaRdsConnectivitySecurityGroup:
      Type: AWS::EC2::SecurityGroup
      Condition: UseLambdaVpcWithRds
      Properties:
        GroupDescription: !Sub "${self:service}-${self:provider.stage} Lambda ENIs (api + migrate) → RDS"
        VpcId: ${env:RDS_VPC_ID, ''}
        SecurityGroupEgress:
          - IpProtocol: "-1"
            CidrIp: 0.0.0.0/0

    RdsIngressFromLambdaSecurityGroup:
      Type: AWS::EC2::SecurityGroupIngress
      Condition: UseLambdaVpcWithRds
      Properties:
        Description: !Sub "PostgreSQL from ${self:service}-${self:provider.stage} Lambdas"
        GroupId: ${env:RDS_SECURITY_GROUP_ID, ''}
        IpProtocol: tcp
        FromPort: 5432
        ToPort: 5432
        SourceSecurityGroupId: !Ref LambdaRdsConnectivitySecurityGroup

    FrontendBucket:
      Type: AWS::S3::Bucket
      Properties:
        BucketName: !Sub "${self:service}-${self:provider.stage}-frontend-${AWS::AccountId}"
        WebsiteConfiguration:
          IndexDocument: index.html
          ErrorDocument: index.html
        PublicAccessBlockConfiguration:
          BlockPublicAcls: false
          IgnorePublicAcls: false
          BlockPublicPolicy: false
          RestrictPublicBuckets: false

    FrontendBucketPolicy:
      Type: AWS::S3::BucketPolicy
      Properties:
        Bucket: !Ref FrontendBucket
        PolicyDocument:
          Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Principal: "*"
              Action: s3:GetObject
              Resource: !Sub "${FrontendBucket.Arn}/*"

    FrontendCloudFrontDistribution:
      Type: AWS::CloudFront::Distribution
      Properties:
        DistributionConfig:
          Enabled: true
          Comment: !Sub "${self:service}-${self:provider.stage} frontend"
          Aliases:
            Fn::If:
              - HasFrontendCustomDomain
              - - "${self:custom.frontendDomainName}"
              - Ref: AWS::NoValue
          Origins:
            - Id: FrontendS3WebsiteOrigin
              DomainName: !Sub "${FrontendBucket}.s3-website.${AWS::Region}.amazonaws.com"
              CustomOriginConfig:
                HTTPPort: 80
                HTTPSPort: 443
                OriginProtocolPolicy: http-only
          DefaultCacheBehavior:
            TargetOriginId: FrontendS3WebsiteOrigin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods:
              - GET
              - HEAD
              - OPTIONS
            CachedMethods:
              - GET
              - HEAD
            Compress: true
            ForwardedValues:
              QueryString: false
              Cookies:
                Forward: none
          DefaultRootObject: index.html
          CustomErrorResponses:
            - ErrorCode: 403
              ResponseCode: 200
              ResponsePagePath: /index.html
            - ErrorCode: 404
              ResponseCode: 200
              ResponsePagePath: /index.html
          PriceClass: PriceClass_100
          ViewerCertificate:
            Fn::If:
              - HasFrontendCustomDomain
              - AcmCertificateArn: "${self:custom.frontendAcmCertArn}"
                SslSupportMethod: sni-only
                MinimumProtocolVersion: TLSv1.2_2021
              - CloudFrontDefaultCertificate: true

  Outputs:
    FrontendBucketName:
      Value: !Ref FrontendBucket
    FrontendWebsiteURL:
      Value: !GetAtt FrontendBucket.WebsiteURL
    FrontendCloudFrontDomainName:
      Value: !GetAtt FrontendCloudFrontDistribution.DomainName
    FrontendCloudFrontDistributionId:
      Value: !Ref FrontendCloudFrontDistribution
    FrontendCustomDomainName:
      Value:
        Fn::If:
          - HasFrontendCustomDomain
          - "${self:custom.frontendDomainName}"
          - ""

    MigrateLambdaName:
      Description: Physical name of the migration Lambda (invoke after deploy)
      Value:
        Ref: MigrateLambdaFunction
